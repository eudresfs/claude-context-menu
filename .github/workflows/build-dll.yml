name: build-dll

on:
  push:
    branches: [main]
    paths: ['native/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # Prevent loops when the bot commits the prebuilt DLL
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure (x64 Release)
        run: cmake -B build -S native -DCMAKE_BUILD_TYPE=Release -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Commit prebuilt DLL
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuilt/
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "build: update prebuilt DLL [skip ci]" &&
            git push
          )
